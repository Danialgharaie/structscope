name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-binary:
    name: Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p structscope-cli
      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          install -Dm755 target/release/structscope "dist/structscope-${VERSION}-x86_64-unknown-linux-gnu"
          tar -czf "dist/structscope-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            -C dist "structscope-${VERSION}-x86_64-unknown-linux-gnu"
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish workspace crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "CRATES_IO_TOKEN secret is not set; skipping crates.io publish."
            exit 1
          fi
          chmod +x .github/scripts/publish-crates.sh
          .github/scripts/publish-crates.sh
