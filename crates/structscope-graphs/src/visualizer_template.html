<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>structscope | {{STRUCTURE_ID}} Visualizer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://3dmol.org/build/3Dmol-min.js"></script>
  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: rgba(17, 24, 39, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-sub: #9ca3af;
      --accent: #3b82f6;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    header {
      height: 60px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background-color: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .struct-id {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-family: monospace;
    }
    
    main {
      flex: 1;
      display: flex;
      position: relative;
      height: calc(100vh - 60px);
    }
    
    .pane {
      height: 100%;
      position: relative;
    }
    
    #viewer-pane {
      width: 45%;
      border-right: 1px solid var(--border-color);
    }
    
    #graph-pane {
      width: 55%;
      background: radial-gradient(circle at 50% 50%, #111827 0%, #0b0f19 100%);
    }
    
    #viewport {
      width: 100%;
      height: 100%;
    }
    
    #graph-svg {
      width: 100%;
      height: 100%;
    }
    
    .card {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    
    #control-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 280px;
      z-index: 5;
    }
    
    #control-panel h3 {
      font-size: 0.875rem;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-sub);
    }
    
    #details-panel {
      position: absolute;
      bottom: 16px;
      left: 16px;
      width: 280px;
      z-index: 5;
    }

    #legend-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 240px;
      z-index: 5;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.75rem;
    }
    
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-right: 8px;
    }
    
    .legend-line {
      width: 20px;
      height: 2px;
      margin-right: 8px;
    }
    
    #tooltip {
      position: absolute;
      padding: 8px 12px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      font-size: 0.75rem;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      z-index: 20;
    }
    
    table.details-table td {
      padding: 4px 0;
      font-size: 0.8125rem;
    }
    
    table.details-table tr td:first-child {
      color: var(--text-sub);
      width: 80px;
    }
    
    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 12px;
      font-size: 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>structscope // Visualizer</h1>
    <div class="struct-id">{{STRUCTURE_ID}}</div>
  </header>
  
  <main>
    <div class="pane" id="viewer-pane">
      <div id="viewport"></div>
      <div class="card" id="control-panel">
        <h3>Representation</h3>
        <div class="btn-group">
          <button class="btn" onclick="setRepresentation('cartoon')">Cartoon</button>
          <button class="btn" onclick="setRepresentation('sphere')">Sphere</button>
          <button class="btn" onclick="setRepresentation('stick')">Stick</button>
        </div>
        <div class="btn-group" style="margin-top: 12px;">
          <button class="btn" onclick="reset3DView()">Reset View</button>
        </div>
      </div>
      
      <div class="card" id="details-panel">
        <h3>Selection Details</h3>
        <div id="details-content" style="font-size: 0.8125rem; color: var(--text-sub);">
          Click on a node or residue to inspect details.
        </div>
      </div>
    </div>
    
    <div class="pane" id="graph-pane">
      <svg id="graph-svg"></svg>
      
      <div class="card" id="legend-panel">
        <h3 style="font-size: 0.875rem; margin-bottom: 12px; text-transform: uppercase; color: var(--text-sub);">Edge Kinds</h3>
        <div id="legend-edges"></div>
      </div>
    </div>
  </main>
  
  <div id="tooltip"></div>
  
  <script>
    const graph = {{GRAPH_JSON}};
    const pdbData = `{{PDB_DATA}}`;
    
    // Initialize 3Dmol viewer
    const element = document.getElementById('viewport');
    const config = { defaultcolors: $3Dmol.rasmolElementColors };
    const viewer = $3Dmol.createViewer(element, config);
    viewer.setBackgroundColor('#0b0f19');
    
    let model = viewer.addModel(pdbData, "pdb");
    viewer.setStyle({}, { cartoon: { color: 'spectrum' } });
    viewer.zoomTo();
    viewer.render();
    
    function setRepresentation(style) {
      viewer.setStyle({}, {});
      if (style === 'cartoon') {
        viewer.setStyle({}, { cartoon: { color: 'spectrum' } });
      } else if (style === 'sphere') {
        viewer.setStyle({}, { sphere: { colorscheme: 'Jmol' } });
      } else if (style === 'stick') {
        viewer.setStyle({}, { stick: { colorscheme: 'Jmol' } });
      }
      viewer.render();
    }
    
    function reset3DView() {
      viewer.zoomTo();
      setRepresentation('cartoon');
      clear3DHighlight();
      selectedNode = null;
      d3.selectAll("circle")
        .attr("r", 9)
        .attr("stroke", "#0b0f19")
        .attr("stroke-width", 1.5);
      document.getElementById("details-content").innerHTML = "Click on a node or residue to inspect details.";
    }

    // Force Graph setup
    const svg = d3.select("#graph-svg");
    const width = svg.node().getBoundingClientRect().width;
    const height = svg.node().getBoundingClientRect().height;
    
    const g = svg.append("g");
    
    svg.call(d3.zoom().on("zoom", (event) => {
      g.attr("transform", event.transform);
    }));
    
    const simulation = d3.forceSimulation(graph.nodes)
        .force("link", d3.forceLink(graph.links).id(d => d.id).distance(80))
        .force("charge", d3.forceManyBody().strength(-150))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(24));
        
    const edgeColors = {
      covalent_adjacency: "#4b5563",
      disulfide: "#fbbf24",
      salt_bridge: "#f97316",
      hydrogen_bond: "#06b6d4",
      cation_pi: "#a855f7",
      pi_pi_parallel: "#ec4899",
      pi_pi_perpendicular: "#f43f5e",
      hydrophobic: "#10b981",
      distance_contact: "#6b7280",
      interface_contact: "#3b82f6"
    };
    
    const edgeStyles = {
      covalent_adjacency: "0",
      disulfide: "0",
      salt_bridge: "4,4",
      hydrogen_bond: "4,4",
      cation_pi: "4,4",
      pi_pi_parallel: "4,4",
      pi_pi_perpendicular: "4,4",
      hydrophobic: "4,4",
      distance_contact: "2,2",
      interface_contact: "2,2"
    };

    // Draw Legend
    const legendContainer = document.getElementById("legend-edges");
    Object.keys(edgeColors).forEach(kind => {
      const exists = graph.links.some(l => l.kind === kind);
      if (exists) {
        const item = document.createElement("div");
        item.className = "legend-item";
        
        const line = document.createElement("div");
        line.className = "legend-line";
        line.style.backgroundColor = edgeColors[kind];
        if (edgeStyles[kind] !== "0") {
          line.style.borderStyle = "dashed";
          line.style.borderWidth = "1px 0 0 0";
          line.style.backgroundColor = "transparent";
          line.style.borderColor = edgeColors[kind];
          line.style.height = "0";
        }
        
        const label = document.createElement("span");
        label.textContent = kind.replace("_", " ");
        
        item.appendChild(line);
        item.appendChild(label);
        legendContainer.appendChild(item);
      }
    });

    const link = g.append("g")
      .selectAll("line")
      .data(graph.links)
      .join("line")
      .attr("stroke", d => edgeColors[d.kind] || "#94a3b8")
      .attr("stroke-opacity", 0.7)
      .attr("stroke-width", d => d.kind === "disulfide" || d.kind === "covalent_adjacency" ? 3.0 : 1.5)
      .attr("stroke-dasharray", d => edgeStyles[d.kind] || "0");
      
    // Coloring nodes by chain
    const chains = Array.from(new Set(graph.nodes.map(n => n.chain_id)));
    const colors = [
      "#3b82f6", "#10b981", "#a855f7", "#ec4899", "#f59e0b",
      "#ef4444", "#06b6d4", "#84cc16", "#6366f1", "#14b8a6"
    ];
    function getNodeColor(d) {
      const idx = chains.indexOf(d.chain_id);
      return colors[idx % colors.length];
    }
    
    const node = g.append("g")
      .selectAll("circle")
      .data(graph.nodes)
      .join("circle")
      .attr("r", 9)
      .attr("fill", d => getNodeColor(d))
      .attr("stroke", "#0b0f19")
      .attr("stroke-width", 1.5)
      .style("cursor", "pointer")
      .style("filter", "drop-shadow(0 2px 4px rgba(0,0,0,0.5))")
      .call(d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged)
          .on("end", dragended));
          
    const label = g.append("g")
      .selectAll("text")
      .data(graph.nodes)
      .join("text")
      .attr("dy", -12)
      .attr("text-anchor", "middle")
      .text(d => d.residue_name ? `${d.residue_name}${d.seq_number}` : (d.atom_name ? `${d.atom_name}` : d.id))
      .attr("fill", "#94a3b8")
      .attr("font-size", "9px")
      .attr("font-family", "monospace")
      .style("pointer-events", "none");
      
    let selectedNode = null;
    
    node.on("mouseover", function(event, d) {
      d3.select(this).transition().duration(150)
        .attr("r", 13)
        .attr("stroke", "#ffffff")
        .attr("stroke-width", 2);
      
      showTooltip(event, d);
      highlightResidueIn3D(d);
    });
    
    node.on("mouseout", function(event, d) {
      if (selectedNode !== d) {
        d3.select(this).transition().duration(150)
          .attr("r", 9)
          .attr("stroke", "#0b0f19")
          .attr("stroke-width", 1.5);
      }
      hideTooltip();
      if (!selectedNode) {
        clear3DHighlight();
      } else {
        highlightResidueIn3D(selectedNode);
      }
    });
    
    node.on("click", function(event, d) {
      selectedNode = d;
      node.attr("r", n => n === d ? 13 : 9)
          .attr("stroke", n => n === d ? "#ffffff" : "#0b0f19")
          .attr("stroke-width", n => n === d ? 2 : 1.5);
      
      zoomToResidueIn3D(d);
      showDetails(d);
    });
    
    function showTooltip(event, d) {
      const tooltip = d3.select("#tooltip");
      const chainName = d.chain_id ? (d.chain_id.split(':').pop() || d.chain_id) : "";
      const labelText = d.residue_name ? `Residue: ${d.residue_name} ${d.seq_number}` : `Atom: ${d.atom_name}`;
      tooltip.style("opacity", 1)
             .html(`
               <div style="font-weight: bold; margin-bottom: 4px;">${labelText}</div>
               ${chainName ? `<div>Chain: ${chainName}</div>` : ""}
               <div>ID: ${d.residue_id || d.atom_id}</div>
             `)
             .style("left", (event.pageX + 15) + "px")
             .style("top", (event.pageY - 15) + "px");
    }
    
    function hideTooltip() {
      d3.select("#tooltip").style("opacity", 0);
    }
    
    function showDetails(d) {
      const chainName = d.chain_id ? (d.chain_id.split(':').pop() || d.chain_id) : "N/A";
      const name = d.residue_name ? `${d.residue_name} ${d.seq_number}` : (d.atom_name ? `${d.atom_name}` : "N/A");
      const id = d.residue_id || d.atom_id || "N/A";
      
      document.getElementById("details-content").innerHTML = `
        <table class="details-table" style="width: 100%;">
          <tr><td><b>Name:</b></td><td>${name}</td></tr>
          <tr><td><b>Chain:</b></td><td>${chainName}</td></tr>
          <tr><td><b>ID:</b></td><td>${id}</td></tr>
          ${d.seq_number ? `<tr><td><b>Seq Num:</b></td><td>${d.seq_number}</td></tr>` : ""}
          ${d.element ? `<tr><td><b>Element:</b></td><td>${d.element}</td></tr>` : ""}
        </table>
      `;
    }
    
    function highlightResidueIn3D(d) {
      const chainName = d.chain_id ? (d.chain_id.split(':').pop() || d.chain_id) : "";
      if (!chainName || !d.seq_number) return;
      
      const spec = { chain: chainName, resi: d.seq_number };
      viewer.setStyle({}, { cartoon: { color: 'spectrum', opacity: 0.25 } });
      viewer.setStyle(spec, { cartoon: { color: '#fbbf24', opacity: 1.0 }, stick: { colorscheme: 'Jmol' } });
      viewer.render();
    }
    
    function zoomToResidueIn3D(d) {
      const chainName = d.chain_id ? (d.chain_id.split(':').pop() || d.chain_id) : "";
      if (!chainName || !d.seq_number) return;
      
      const spec = { chain: chainName, resi: d.seq_number };
      viewer.setStyle({}, { cartoon: { color: 'spectrum', opacity: 0.25 } });
      viewer.setStyle(spec, { cartoon: { color: '#fbbf24', opacity: 1.0 }, stick: { colorscheme: 'Jmol', radius: 0.3 } });
      viewer.zoomTo(spec, 1000);
      viewer.render();
    }
    
    function clear3DHighlight() {
      viewer.setStyle({}, { cartoon: { color: 'spectrum', opacity: 1.0 } });
      viewer.render();
    }
    
    simulation.on("tick", () => {
      link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);
    
      node
          .attr("cx", d => d.x)
          .attr("cy", d => d.y);
    
      label
          .attr("x", d => d.x)
          .attr("y", d => d.y);
    });
    
    function dragstarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }
    
    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }
    
    function dragended(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }
  </script>
</body>
</html>
